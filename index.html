<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>応援券検索</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .sticky-top { position: sticky; top: 0; background: #f0f2f5; padding: 10px 0; z-index: 100; }
        input { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #0288D1; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn-gps { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 8px; cursor: pointer; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #0288D1; cursor: pointer; }
        .name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .addr { font-size: 0.85rem; color: #666; white-space: pre-line; line-height: 1.4; }
        .dist { font-weight: bold; font-size: 0.8rem; margin-top: 8px; }
        .loading { text-align: center; padding: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sticky-top">
        <input type="text" id="q" placeholder="店名・住所・キーワードで検索...">
        <button class="btn-gps" onclick="getGPS()">📍 現在地から近い順に並べる</button>
    </div>
    <div id="list">
        <div class="loading">⏳ KMLデータを読み込み中...</div>
    </div>

    <script>
        // PWA Service Worker（現在はオフ。必要になればコメントを外してね）
        // if ('serviceWorker' in navigator) {
        //     navigator.serviceWorker.register('sw.js').catch(() => {});
        // }

        let rawData = [];
        let userLoc = null;

        // 距離計算の関数
        function calcDist(la1, lo1, la2, lo2) {
            const R = 6371;
            const dLa = (la2-la1)*Math.PI/180;
            const dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 同じフォルダにある「doc.kml」を自動で読み込んで解析する最強機能！
        async function loadKML() {
            try {
                const response = await fetch('doc.kml');
                if (!response.ok) throw new Error("KMLが見つかりません");
                const kmlText = await response.text();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(kmlText, "text/xml");
                const placemarks = xmlDoc.getElementsByTagName("Placemark");
                
                for (let i = 0; i < placemarks.length; i++) {
                    const p = placemarks[i];
                    const name = p.getElementsByTagName("name")[0]?.textContent || "名称不明";
                    let desc = p.getElementsByTagName("description")[0]?.textContent || "";
                    
                    // 説明文の中の <br> などを改行に直す
                    desc = desc.replace(/<br\s*[\/]?>/gi, '\n').replace(/<\/?[^>]+(>|$)/g, "").trim();

                    // 座標（緯度・経度）を取り出す
                    let lat = null, lng = null;
                    const coords = p.getElementsByTagName("coordinates")[0]?.textContent;
                    if (coords) {
                        const parts = coords.trim().split(',');
                        if (parts.length >= 2) {
                            lng = parseFloat(parts[0]);
                            lat = parseFloat(parts[1]);
                        }
                    }
                    
                    rawData.push({ n: name, a: desc, lat: lat, lng: lng });
                }
                render(); // データが読み終わったら画面を描画
            } catch (error) {
                document.getElementById('list').innerHTML = "<div class='loading' style='color:red;'>⚠️ doc.kml の読み込みに失敗しました。<br>GitHubに doc.kml がアップロードされているか確認してね！</div>";
            }
        }

        function render() {
            const word = document.getElementById('q').value.toLowerCase();
            const listEl = document.getElementById('list');
            listEl.innerHTML = "";

            if (rawData.length === 0) return;

            let filtered = rawData.filter(s => s.n.toLowerCase().includes(word) || s.a.toLowerCase().includes(word));

            if (userLoc) {
                filtered.forEach(s => {
                    // 座標があるお店だけ距離を計算する
                    if (s.lat !== null && s.lng !== null) {
                        s.d = calcDist(userLoc.lat, userLoc.lng, s.lat, s.lng);
                    } else {
                        s.d = 9999; // 座標がないお店は一番下にするための仮の数字
                    }
                });
                // 距離が近い順に並び替え
                filtered.sort((a, b) => a.d - b.d);
            }

            filtered.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card';
                
                let dText = "";
                if (userLoc) {
                    if (s.d !== 9999) {
                        dText = `<div class="dist" style="color:#0288D1;">📍 現在地から約 ${s.d.toFixed(2)} km</div>`;
                    } else {
                        dText = `<div class="dist" style="color:#E64A19;">📍 距離計算不可（座標データなし）</div>`;
                    }
                }

                div.innerHTML = `<div class="name">${s.n}</div><div class="addr">${s.a}</div>${dText}`;
                
                // タップでGoogleマップを起動
                div.onclick = () => {
                    let url;
                    if (s.lat !== null && s.lng !== null) {
                        // 座標があればピンポイントで開く
                        url = `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`;
                    } else {
                        // 座標がなければ「お店の名前＋住所」で検索して開く
                        const addressFirstLine = s.a.split('\n')[0];
                        url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.n + " " + addressFirstLine)}`;
                    }
                    location.href = url;
                };
                
                listEl.appendChild(div);
            });
        }

        function getGPS() {
            if (!navigator.geolocation) return alert("GPS未対応です");
            navigator.geolocation.getCurrentPosition(p => {
                userLoc = { lat: p.coords.latitude, lng: p.coords.longitude };
                render();
            }, () => alert("位置情報を許可してください"));
        }

        document.getElementById('q').oninput = render;
        
        // アプリ起動時にKMLを読み込む
        loadKML();
    </script>
</body>
</html>
